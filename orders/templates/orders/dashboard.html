<!DOCTYPE html>
<html>
<head>
    <title>Bakery Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Bakery Order Management System</h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center shadow border-0">
                <div class="card-body">
                    <h5 class="text-muted">Total Orders</h5>
                    <h2 class="text-primary">{{ total_orders }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow border-0">
                <div class="card-body">
                    <h5 class="text-muted">Pending Orders</h5>
                    <h2 class="text-warning">{{ pending_orders }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow border-0">
                <div class="card-body">
                    <h5 class="text-muted">Completed Orders</h5>
                    <h2 class="text-success">{{ completed_orders }}</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <a href="/orders/" class="btn btn-primary">View Orders</a>
        <a href="/add-order/" class="btn btn-success">Add Order</a>
    </div>

</div>

</body>
</html>
